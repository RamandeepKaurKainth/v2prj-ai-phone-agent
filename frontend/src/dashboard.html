<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - AI Phone Agent</title>
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <div class="dashboard-container">
    <div class="top-bar">
      <div>
        <h1>AI Phone Agent Dashboard</h1>
        <p>Send messages and monitor account usage</p>
      </div>
      <a href="/index.html" class="logout-btn" onclick="localStorage.removeItem('token')">Logout</a>
    </div>

    <div class="dashboard-grid">
      <section class="card">
        <h2>Send SMS</h2>

        <label for="phone">Phone Number</label>
        <input type="text" id="phone" placeholder="+16045551234" />

        <label for="message">Message</label>
        <textarea id="message" placeholder="Type your message"></textarea>

        <button onclick="sendSMS()">Send Message</button>
        <p id="result"></p>
      </section>

      <aside class="card">
        <h2>Account Overview</h2>
        <div id="userInfo">Loading user...</div>
        <div id="UserListForAdmin"></div>
      </aside>
    </div>
  </div>

  <script src="js/dashboard.js"></script>
</body>
</html>
