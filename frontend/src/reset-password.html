<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - AI Phone Agent</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="auth-shell">
    <div class="auth-layout single-layout">
      <section class="auth-card glass-card">
        <h2 class="brand-title">Reset Password</h2>
        <p class="subtitle">Enter your reset token and new password.</p>

        <form id="resetPasswordForm" class="active">
          <label for="resetToken">Reset Token</label>
          <input type="text" id="resetToken" placeholder="Paste reset token" required />

          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" placeholder="New password" required />

          <p class="error" id="resetError">Something went wrong</p>
          <p class="success" id="resetSuccess">Password updated successfully</p>

          <button type="submit">Reset Password</button>

          <div class="form-links" style="text-align:left; margin-top:16px;">
            <a href="index.html">Back to login</a>
          </div>
        </form>
      </section>
    </div>
  </div>

  <script src="js/reset-password.js"></script>
</body>
</html>
