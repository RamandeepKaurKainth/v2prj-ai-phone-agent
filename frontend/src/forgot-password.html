<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - AI Phone Agent</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="auth-shell">
    <div class="auth-layout single-layout">
      <section class="auth-card glass-card">
        <h2 class="brand-title">Forgot Password</h2>
        <p class="subtitle">Enter your email and we’ll generate a reset link token.</p>

        <form id="forgotPasswordForm" class="active">
          <label for="forgotEmail">Email</label>
          <input type="email" id="forgotEmail" placeholder="Email address" required />

          <p class="error" id="forgotError">Something went wrong</p>
          <p class="success" id="forgotSuccess">Reset request created</p>

          <button type="submit">Request Reset</button>

          <div class="form-links" style="text-align:left; margin-top:16px;">
            <a href="index.html">Back to login</a>
          </div>
        </form>
      </section>
    </div>
  </div>

  <script src="js/forgot-password.js"></script>
</body>
</html>
